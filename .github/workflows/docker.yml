name: Build & Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and image names
        id: meta
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          GHCR_IMAGE=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "GHCR_IMAGE=$GHCR_IMAGE" >> $GITHUB_OUTPUT
          echo "DH_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/tmdbcachex" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.GHCR_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.GHCR_IMAGE }}:latest
            ${{ steps.meta.outputs.DH_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            ${{ steps.meta.outputs.DH_IMAGE }}:latest

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ steps.meta.outputs.DH_IMAGE }}
          readme-filepath: ./dockerhub-description.md

      - name: Read release notes
        id: notes
        run: |
          if [ -f release-notes.md ]; then
            echo "body<<RELEASE_EOF" >> $GITHUB_OUTPUT
            cat release-notes.md >> $GITHUB_OUTPUT
            echo "RELEASE_EOF" >> $GITHUB_OUTPUT
          else
            echo "body=版本 v${{ steps.meta.outputs.VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.meta.outputs.VERSION }}
          body: ${{ steps.notes.outputs.body }}
