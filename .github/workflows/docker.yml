name: Build & Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and image names
        id: meta
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          GHCR_IMAGE=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "GHCR_IMAGE=$GHCR_IMAGE" >> $GITHUB_OUTPUT
          echo "DH_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/tmdbcachex" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.GHCR_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.GHCR_IMAGE }}:latest
            ${{ steps.meta.outputs.DH_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            ${{ steps.meta.outputs.DH_IMAGE }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.meta.outputs.VERSION }}
          body: |
            ## Docker 镜像

            **GitHub Container Registry:**
            ```
            docker pull ghcr.io/${{ steps.meta.outputs.GHCR_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            docker pull ghcr.io/${{ steps.meta.outputs.GHCR_IMAGE }}:latest
            ```

            **Docker Hub:**
            ```
            docker pull ${{ steps.meta.outputs.DH_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            docker pull ${{ steps.meta.outputs.DH_IMAGE }}:latest
            ```

            **支持平台:** `linux/amd64`, `linux/arm64`

            ## 使用方法

            ```bash
            docker run -d \
              -p 3333:3333 \
              -v /你的数据目录:/app/data \
              ghcr.io/${{ steps.meta.outputs.GHCR_IMAGE }}:latest
            ```
          generate_release_notes: true
